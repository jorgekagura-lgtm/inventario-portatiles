<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión TIC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #c7c7c7; font-family: sans-serif; }
        .navbar { background: white; border-bottom: 1px solid #ddd; }
        .btn-action { padding: 25px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; color: white; text-decoration: none; font-weight: bold; }
        .inventory-box { background: white; border-radius: 15px; overflow: hidden; margin-top: 20px; }
        .text-usuario { color: #ff5e3a; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="fw-bold">Gestión Portátiles TIC</span>
            <div>
                <a href="/historial" class="btn btn-sm btn-outline-dark">Historial</a>
                <a href="/nuevo_portatil" class="btn btn-sm btn-dark">+ Nuevo</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row g-3">
            <div class="col-6">
                <a href="/prestar" class="btn-action bg-danger">PRESTAR</a>
            </div>
            <div class="col-6">
                <a href="/devolver" class="btn-action bg-warning">DEVOLVER</a>
            </div>
        </div>

        <div class="inventory-box">
            <div class="bg-dark text-white p-2 d-flex justify-content-between">
                <span>Inventario</span>
                <input type="text" id="busqueda" placeholder="Buscar...">
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ubicación / Usuario</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in portatiles %}
                    <tr class="fila">
                        <td>{{ p.id }}</td>
                        <td>
                            {% if p.estado == 'Prestado' %}
                                <span class="text-usuario">{{ p.usuario_actual }}</span>
                            {% else %}
                                {{ p.ubicacion }}
                            {% endif %}
                        </td>
                        <td>{{ p.estado }}</td>
                        <td>
                            <a href="/editar_equipo/{{ p.id }}"><i class="bi bi-pencil"></i></a>
                            <a href="/eliminar_equipo/{{ p.id }}" class="text-danger"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('busqueda').addEventListener('keyup', function() {
            let val = this.value.toLowerCase();
            document.querySelectorAll('.fila').forEach(f => {
                f.style.display = f.innerText.toLowerCase().includes(val) ? "" : "none";
            });
        });
    </script>
</body>
</html>
