<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Equipo - EASD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #cec9c9; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .form-container { 
            background-color: #1e1e1e; 
            border-radius: 20px; 
            padding: 40px; 
            width: 100%; 
            max-width: 600px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid #333;
        }
        .form-label { color: #aaa; font-weight: 500; font-size: 0.9rem; }
        .form-control, .form-select { 
            background-color: #252525; 
            border: 1px solid #444; 
            color: white; 
            padding: 12px;
            border-radius: 10px;
        }
        .form-control:focus, .form-select:focus { 
            background-color: #2b2b2b; 
            border-color: #ffc107; 
            color: white; 
            box-shadow: none; 
        }
        .form-select { 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23aaa' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        }
        .btn-update { 
            background-color: #ffc107; 
            color: #000; 
            font-weight: bold; 
            border: none; 
            padding: 15px; 
            border-radius: 12px;
            transition: all 0.3s;
        }
        .btn-update:hover { background-color: #e5ad06; transform: translateY(-2px); }
        
        /* MEJORA DEL BOTÓN VOLVER */
        .btn-cancel {
            background-color: #444;
            color: white !important;
            font-weight: 600;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s;
            text-align: center;
        }
        .btn-cancel:hover {
            background-color: #555;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="text-center mb-4">
            <i class="bi bi-pencil-square text-warning fs-1"></i>
            <h3 class="text-white mt-2 fw-bold">Editar Equipo</h3>
            <p class="text-muted small">Modificando el equipo: <span class="text-warning">{{ equipo.id }}</span></p>
        </div>

        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">ID Portátil</label>
                    <input type="text" name="id_portatil" class="form-control" value="{{ equipo.id }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">Ubicación</label>
                    <input type="text" name="ubicacion" class="form-control" value="{{ equipo.ubicacion }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">Número de Serie (S/N)</label>
                    <input type="text" name="num_serie" class="form-control" value="{{ equipo.num_serie }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">Estado Actual</label>
                    <select name="estado" class="form-select" required>
                        <option value="Disponible" {% if equipo.estado == 'Disponible' %}selected{% endif %}>Disponible</option>
                        <option value="Prestado" {% if equipo.estado == 'Prestado' %}selected{% endif %}>Prestado</option>
                        <option value="Averiado" {% if equipo.estado == 'Averiado' %}selected{% endif %}>⚠️ Averiado (No arranca)</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-uppercase">Ficha Técnica / Descripción</label>
                <textarea name="descripcion_tecnica" class="form-control" rows="3" required>{{ equipo.descripcion_tecnica }}</textarea>
            </div>

            <div class="d-grid gap-3">
                <button type="submit" class="btn btn-update">
                    <i class="bi bi-arrow-repeat me-2"></i>ACTUALIZAR DATOS
                </button>
                <a href="/" class="btn btn-cancel">
                    <i class="bi bi-x-circle me-2"></i>CANCELAR Y VOLVER
                </a>
            </div>
        </form>
    </div>

</body>
</html>
