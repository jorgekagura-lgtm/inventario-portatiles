<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Nuevo Equipo - EASD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #cec9c9 !important; min-height: 100vh; font-family: 'Segoe UI', sans-serif; margin: 0; }

        .navbar { 
            background-color: #ffffff !important; 
            border-bottom: 1px solid #dee2e6; 
            padding: 12px 0; 
            margin-bottom: 40px;
            position: relative;
        }

        /* TAMAÑO LOGO PC */
        .navbar-brand img {
            height: 60px;
            transition: height 0.3s ease;
        }

        .navbar-center-title { 
            font-weight: 800; 
            color: #333; 
            text-transform: uppercase;
            letter-spacing: 1px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .form-container { background-color: #1e1e1e; border-radius: 20px; padding: 40px; width: 100%; max-width: 600px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 1px solid #333; margin: auto; }
        .form-label { color: #aaa; font-weight: bold; font-size: 0.8rem; letter-spacing: 0.5px; }
        .form-control { background-color: #252525; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; }
        .form-control:focus { background-color: #2b2b2b; border-color: #0dcaf0; color: white; box-shadow: none; }

        .btn-save { background-color: #0dcaf0; color: #000; font-weight: bold; border: none; padding: 15px; border-radius: 12px; transition: all 0.3s; }
        .btn-save:hover { background-color: #0baccc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(13, 202, 240, 0.3); }

        .btn-cancel { border-radius: 12px; padding: 12px; color: #ccc; border: 1px solid #444; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .btn-cancel:hover { background-color: #2a2a2a; color: #fff; border-color: #666; }

        .btn-historial { font-size: 0.75rem; font-weight: bold; color: #555; border: 1.5px solid #ddd; border-radius: 20px; padding: 5px 15px; text-decoration: none; }

        @media (max-width: 768px) {
            .navbar-brand img { height: 30px !important; }
            .navbar-center-title { font-size: 0.7rem; position: static; transform: none; margin: 10px auto; order: 2; }
            .navbar .container { flex-direction: column; }
            .navbar-brand { order: 1; }
            .nav-right { order: 3; margin-top: 5px; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light shadow-sm">
        <div class="container d-flex align-items-center justify-content-between">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='easd-valencia-1.PNG') }}" class="me-2">
                <img src="{{ url_for('static', filename='easd-valencia-2.PNG') }}">
            </a>
            <div class="navbar-center-title">Gestión Portátiles TIC</div>
            <div class="nav-right">
                <a href="/historial" class="btn-historial"><i class="bi bi-clock-history me-1"></i> HISTORIAL</a>
            </div>
        </div>
    </nav>

    <div class="container d-flex">
        <div class="form-container">
            <div class="text-center mb-4">
                <h3 class="text-white fw-bold">Nuevo Portátil</h3>
                <p class="text-muted small text-uppercase" style="letter-spacing: 2px;">Registro de Inventario</p>
            </div>
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">ID EQUIPO</label>
                        <input type="text" name="id_portatil" class="form-control" required autofocus>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">UBICACIÓN</label>
                        <input type="text" name="ubicacion" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">NÚMERO DE SERIE (S/N)</label>
                    <input type="text" name="num_serie" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">FICHA TÉCNICA</label>
                    <textarea name="descripcion_tecnica" class="form-control" rows="3" required></textarea>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-save shadow"><i class="bi bi-plus-circle me-2"></i>GUARDAR</button>
                    <a href="/" class="btn-cancel mt-2"><i class="bi bi-arrow-left me-2"></i>CANCELAR</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
